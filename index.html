<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultrapulse v1.8 - 250-Tone Stochastic</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #050505; color: #00ff41; }
        .card { background: #111; padding: 25px; border-radius: 12px; border: 1px solid #00ff4155; width: 100%; max-width: 600px; box-shadow: 0 0 40px rgba(0,255,100,0.1); }
        .controls { margin-bottom: 20px; }
        .input-row { display: flex; align-items: center; gap: 10px; margin-top: 8px; }
        .toggle-row { display: flex; align-items: center; justify-content: space-between; margin-top: 15px; background: #1a1a1a; padding: 10px; border-radius: 4px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; }
        input[type="range"], select { flex-grow: 1; background: #000; color: #00ff41; border: 1px solid #333; padding: 10px; border-radius: 4px; outline: none; }
        input[type="number"] { width: 70px; background: #000; color: #fff; border: 1px solid #00ff41; padding: 8px; border-radius: 4px; text-align: center; }
        canvas { width: 100%; height: 120px; background: #000; border: 1px solid #222; margin: 15px 0; }
        #log-container { height: 100px; overflow-y: hidden; background: #000; padding: 10px; font-size: 11px; border: 1px solid #222; display: flex; flex-direction: column-reverse; color: #00ff41; }
        .log-entry { border-left: 3px solid #00ff41; padding-left: 8px; margin-bottom: 3px; background: rgba(0, 255, 65, 0.05); }
        button { margin-top: 25px; padding: 20px; cursor: pointer; width: 100%; border: 1px solid #00ff41; background: transparent; color: #00ff41; font-size: 16px; font-weight: bold; letter-spacing: 3px; transition: 0.2s; text-transform: uppercase; }
        button:hover { background: #00ff4122; }
        button.stop { color: #ff0000; border-color: #ff0000; }
        .val-display { float: right; color: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0; text-align: center; letter-spacing: 6px; color: #fff;">ULTRAPULSE v1.8</h2>
    <p style="text-align:center; font-size: 10px; color: #888;">RANGE: 1Hz — 22kHz | MAX DENSITY: 250 TONES</p>
    
    <div class="controls">
        <label>Engine Mode</label>
        <select id="playMode">
            <option value="single">Single Tone (In Group)</option>
            <option value="group">Full Group Burst</option>
            <option value="global">Random Global (1 Tone)</option>
            <option value="multi-global" selected>Multi-Global Cluster</option>
        </select>

        <label>Max Concurrent Tones (1-250)</label>
        <div class="input-row">
            <input type="range" id="toneSlider" min="1" max="250" step="1" value="10">
            <input type="number" id="toneInput" min="1" max="250" value="10">
        </div>

        <div class="toggle-row">
            <span style="font-size: 12px; font-weight: bold;">RANDOM DURATION (25ms - 100ms)</span>
            <input type="checkbox" id="randomDurToggle" style="width: 20px; height: 20px; cursor: pointer;">
        </div>

        <label id="durLabelContainer">Pulse Window <span class="val-display" id="durLabel">2ms</span></label>
        <input type="range" id="duration" min="1" max="100" step="1" value="2">

        <label>Master Gain <span class="val-display" id="volLabel">0.01</span></label>
        <input type="range" id="masterVol" min="0" max="0.1" step="0.001" value="0.01">
    </div>

    <canvas id="visualizer"></canvas>
    <div id="log-container"></div>

    <button id="startBtn">START SIGNAL ENGINE</button>
</div>

<script>
    let audioCtx = null, isRunning = false, masterGain = null, analyser = null, animationId = null;
    const logEl = document.getElementById('log-container');
    const allFreqs = new Set();
    const groups = [];

    // Frequency Generation (1Hz - 22kHz)
    for (let i = 0; i <= 9; i++) {
        let start = 1.0 + (i * 0.1);
        if (i === 1) start = 1.5;
        const list = [];
        for (let f = start; f <= 22.0; f += 1.0) {
            let hz = Math.round(f * 1000);
            if (hz >= 1 && hz <= 22000) { list.push(hz); allFreqs.add(hz); }
        }
        if (i === 0) { allFreqs.add(1); list.unshift(1); }
        groups.push({ id: i + 1, freqs: list });
    }
    const globalPool = Array.from(allFreqs);

    const addLog = (msg) => {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.textContent = `> ${msg}`;
        logEl.prepend(div);
        if (logEl.childNodes.length > 8) logEl.removeChild(logEl.lastChild);
    };

    const draw = () => {
        animationId = requestAnimationFrame(draw);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);
        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 2;
        canvasCtx.strokeStyle = '#00ff41';
        canvasCtx.beginPath();
        const sliceWidth = canvas.width / bufferLength;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = v * canvas.height / 2;
            if (i === 0) canvasCtx.moveTo(x, y); else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.stroke();
    };

    const canvas = document.getElementById('visualizer'), canvasCtx = canvas.getContext('2d');

    const playPulse = () => {
        if (!isRunning) return;
        
        let durMs;
        const isRandom = document.getElementById('randomDurToggle').checked;
        if (isRandom) {
            durMs = Math.floor(Math.random() * (100 - 25 + 1)) + 25;
        } else {
            durMs = parseInt(document.getElementById('duration').value);
        }

        const mode = document.getElementById('playMode').value;
        const maxTones = parseInt(document.getElementById('toneInput').value);
        const now = audioCtx.currentTime;

        let freqsToPlay = [];
        let label = "";

        if (mode === 'multi-global') {
            const count = Math.floor(Math.random() * maxTones) + 1;
            for(let i=0; i<count; i++) {
                freqsToPlay.push(globalPool[Math.floor(Math.random() * globalPool.length)]);
            }
            label = `STOCHASTIC CLUSTER: ${count} TONES | ${durMs}ms`;
        } else if (mode === 'global') {
            freqsToPlay = [globalPool[Math.floor(Math.random() * globalPool.length)]];
            label = `GLOBAL: ${freqsToPlay[0]}Hz | ${durMs}ms`;
        } else {
            const g = groups[Math.floor(Math.random() * groups.length)];
            freqsToPlay = (mode === 'single') ? [g.freqs[Math.floor(Math.random() * g.freqs.length)]] : g.freqs;
            label = `GRP${g.id}: ${mode === 'single' ? freqsToPlay[0] + 'Hz' : 'BURST'} | ${durMs}ms`;
        }

        addLog(label);

        const burstGain = audioCtx.createGain();
        burstGain.connect(masterGain);
        const scale = 1 / freqsToPlay.length;

        burstGain.gain.setValueAtTime(0, now);
        burstGain.gain.linearRampToValueAtTime(scale, now + 0.002); // Slightly longer attack for 25ms+ stability
        burstGain.gain.setValueAtTime(scale, now + (durMs/1000) - 0.002);
        burstGain.gain.linearRampToValueAtTime(0, now + (durMs/1000));

        freqsToPlay.forEach(f => {
            const osc = audioCtx.createOscillator();
            const panner = audioCtx.createStereoPanner();
            panner.pan.setValueAtTime((Math.random() * 2 - 1), now);
            osc.frequency.setValueAtTime(f, now);
            osc.connect(panner);
            panner.connect(burstGain);
            osc.start(now);
            osc.stop(now + (durMs/1000));
        });
        setTimeout(playPulse, durMs);
    };

    const toneSlider = document.getElementById('toneSlider'), toneInput = document.getElementById('toneInput');
    toneSlider.oninput = () => toneInput.value = toneSlider.value;
    toneInput.oninput = () => { if (toneInput.value > 250) toneInput.value = 250; toneSlider.value = toneInput.value; };

    document.getElementById('randomDurToggle').onchange = (e) => {
        document.getElementById('duration').disabled = e.target.checked;
        document.getElementById('durLabelContainer').style.opacity = e.target.checked ? "0.3" : "1";
    };

    document.getElementById('startBtn').onclick = () => {
        if (!isRunning) {
            audioCtx = new AudioContext();
            masterGain = audioCtx.createGain();
            analyser = audioCtx.createAnalyser();
            masterGain.gain.value = document.getElementById('masterVol').value;
            masterGain.connect(analyser); analyser.connect(audioCtx.destination);
            isRunning = true;
            document.getElementById('startBtn').textContent = "KILL SIGNAL";
            document.getElementById('startBtn').classList.add('stop');
            draw(); playPulse();
        } else {
            isRunning = false; cancelAnimationFrame(animationId); audioCtx.close();
            document.getElementById('startBtn').textContent = "START SIGNAL ENGINE";
            document.getElementById('startBtn').classList.remove('stop');
        }
    };

    document.getElementById('masterVol').oninput = (e) => {
        document.getElementById('volLabel').textContent = e.target.value;
        if (masterGain) masterGain.gain.value = e.target.value;
    };
    document.getElementById('duration').oninput = (e) => {
        document.getElementById('durLabel').textContent = e.target.value + "ms";
    };
</script>
</body>
</html>
