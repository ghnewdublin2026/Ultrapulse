<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Frequency Pulse Generator + Log</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #121212; color: #00ff41; }
        .card { background: #1e1e1e; padding: 25px; border-radius: 12px; border: 1px solid #333; width: 100%; max-width: 600px; box-shadow: 0 0 20px rgba(0,255,65,0.1); }
        .controls { margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #888; }
        input[type="range"] { width: 100%; accent-color: #00ff41; }
        canvas { width: 100%; height: 120px; background: #000; border: 1px solid #333; margin: 15px 0; }
        
        #log-container {
            height: 150px;
            overflow-y: hidden;
            background: #000;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column-reverse;
        }
        .log-entry { border-left: 2px solid #00ff41; padding-left: 8px; margin-bottom: 4px; }
        
        button { margin-top: 25px; padding: 15px; cursor: pointer; width: 100%; border: 1px solid #00ff41; background: transparent; color: #00ff41; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background: rgba(0,255,65,0.1); }
        button.stop { color: #ff4141; border-color: #ff4141; }
        .val-display { float: right; color: #fff; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0; text-align: center;">RF-AUDIO PULSE GENERATOR</h2>
    
    <div class="controls">
        <label>Master Volume <span class="val-display" id="volLabel">0.01</span></label>
        <input type="range" id="masterVol" min="0" max="0.1" step="0.001" value="0.01">

        <label>Pulse Duration <span class="val-display" id="durLabel">2ms</span></label>
        <input type="range" id="duration" min="1" max="100" step="1" value="2">
    </div>

    <canvas id="visualizer"></canvas>

    <div id="log-container">
        </div>

    <button id="startBtn">INITIALIZE SEQUENCE</button>
</div>

<script>
    let audioCtx = null;
    let isRunning = false;
    let masterGain = null;
    let analyser = null;
    let animationId = null;
    const logEl = document.getElementById('log-container');

    const generateGroups = () => {
        const groups = [];
        // Group logic: Start points 1.0, 1.1, 1.2 ... 1.9
        for (let i = 0; i <= 9; i++) {
            let startVal = 1.0 + (i * 0.1);
            const freqList = [];
            
            // Per prompt: Group 2 starts at 1.5
            let actualStart = (i === 1) ? 1.5 : startVal;
            
            // Max frequency 40kHz (Group 2 ends at 39.5kHz)
            let limit = (i === 1) ? 39.5 : 40.0;

            for (let f = actualStart; f <= limit; f += 1.0) {
                freqList.push(Math.round(f * 1000)); 
            }
            groups.push({ id: i + 1, freqs: freqList, startTag: actualStart.toFixed(1) });
        }
        return groups;
    };

    const groups = generateGroups();

    const addLog = (groupId, freq) => {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.textContent = `[GROUP ${groupId}] -> ${freq} Hz`;
        logEl.prepend(div);
        if (logEl.childNodes.length > 8) logEl.removeChild(logEl.lastChild);
    };

    const draw = () => {
        animationId = requestAnimationFrame(draw);
        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);
        analyser.getByteTimeDomainData(dataArray);

        canvasCtx.fillStyle = '#000';
        canvasCtx.fillRect(0, 0, canvas.width, canvas.height);
        canvasCtx.lineWidth = 1;
        canvasCtx.strokeStyle = '#00ff41';
        canvasCtx.beginPath();

        const sliceWidth = canvas.width / bufferLength;
        let x = 0;
        for (let i = 0; i < bufferLength; i++) {
            const v = dataArray[i] / 128.0;
            const y = v * canvas.height / 2;
            if (i === 0) canvasCtx.moveTo(x, y);
            else canvasCtx.lineTo(x, y);
            x += sliceWidth;
        }
        canvasCtx.stroke();
    };

    const canvas = document.getElementById('visualizer');
    const canvasCtx = canvas.getContext('2d');

    const playPulse = () => {
        if (!isRunning) return;

        const durationMs = parseInt(document.getElementById('duration').value);
        const durationSec = durationMs / 1000;

        const group = groups[Math.floor(Math.random() * groups.length)];
        const freq = group.freqs[Math.floor(Math.random() * group.freqs.length)];

        addLog(group.id, freq);

        const osc = audioCtx.createOscillator();
        const pulseGain = audioCtx.createGain();

        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

        pulseGain.connect(masterGain);
        osc.connect(pulseGain);

        const now = audioCtx.currentTime;
        pulseGain.gain.setValueAtTime(0, now);
        pulseGain.gain.linearRampToValueAtTime(1, now + 0.0002); 
        pulseGain.gain.setValueAtTime(1, now + durationSec - 0.0002);
        pulseGain.gain.linearRampToValueAtTime(0, now + durationSec);

        osc.start(now);
        osc.stop(now + durationSec);

        setTimeout(playPulse, durationMs);
    };

    document.getElementById('startBtn').addEventListener('click', () => {
        if (!isRunning) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 2048;
            
            masterGain.gain.value = document.getElementById('masterVol').value;
            masterGain.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            isRunning = true;
            document.getElementById('startBtn').textContent = "STOP SEQUENCE";
            document.getElementById('startBtn').classList.add('stop');
            draw();
            playPulse();
        } else {
            isRunning = false;
            cancelAnimationFrame(animationId);
            audioCtx.close();
            document.getElementById('startBtn').textContent = "INITIALIZE SEQUENCE";
            document.getElementById('startBtn').classList.remove('stop');
        }
    });

    document.getElementById('masterVol').oninput = (e) => {
        document.getElementById('volLabel').textContent = e.target.value;
        if (masterGain) masterGain.gain.value = e.target.value;
    };
    document.getElementById('duration').oninput = (e) => {
        document.getElementById('durLabel').textContent = e.target.value + "ms";
    };
</script>
</body>
</html>
